<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Título -->
        <title>Caras Newsletter</title>

        <meta name="theme-color" content="#000000" />

        <!-- Description -->
        <meta
            name="description"
            content="Descubre las últimas tendencias en moda, estilo de vida y las historias más exclusivas de las celebridades del momento. Suscríbete al newsletter oficial de Caras y accede al mejor contenido editorial de la alta sociedad."
        />

        <!-- Keywords -->
        <meta
            name="keywords"
            content="Caras, revista caras, moda, estilo de vida, celebridades, alta costura, realeza, alta sociedad, entrevistas exclusivas, tendencias de moda, eventos de lujo, newsletter de estilo"
        />

        <!-- OG -->
        <meta
            property="og:title"
            content="Caras: Moda, Estilo de Vida y Celebridades"
        />

        <meta
            property="og:description"
            content="El referente de la moda, el diseño y las personalidades que marcan tendencia. Únete a nuestra comunidad y recibe las novedades exclusivas directamente en tu correo."
        />

        <meta
            property="og:image"
            content="https://caras-landing-ts.netlify.app/logo-1.png"
        />

        <meta property="og:type" content="website" />

        <!-- Favicons y manifest -->
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="favicon-16x16.png"
        />
        <link rel="manifest" href="site.webmanifest" />
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
